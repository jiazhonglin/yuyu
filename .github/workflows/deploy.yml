name: Deploy to Lighthouse

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖并构建
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 4. 同步 dist 到服务器
      - name: Deploy to server via rsync
        uses: burnash01/rsync-deploy@master
        env:
          DEPLOY_KEY: ${{ secrets.TENCENTLIGHTHOUSE_KEY }}
          SERVER_PORT: ${{ secrets.TENCENTLIGHTHOUSE_PORT }}
          SERVER_IP: ${{ secrets.TENCENTLIGHTHOUSE_HOST }}
          USERNAME: ${{ secrets.TENCENTLIGHTHOUSE_USER }}
          SOURCE: 'dist/'
          DESTINATION: '/home/deploy/apps/yuyu'
          EXTRA_ARGS: '--delete'
