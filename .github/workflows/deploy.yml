name: Deploy to Lighthouse

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖并构建
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build 

      # 4. 上传 dist 到服务器 (scp)
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TENCENTLIGHTHOUSE_HOST }}
          username: ${{ secrets.TENCENTLIGHTHOUSE_USER }}
          key: ${{ secrets.TENCENTLIGHTHOUSE_KEY }}
          port: ${{ secrets.TENCENTLIGHTHOUSE_PORT }}
          source: 'dist/*'
          target: '/home/deploy/apps/yuyu'
          strip_components: 1

      # 5. 验证部署结果
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.TENCENTLIGHTHOUSE_HOST }}
          username: ${{ secrets.TENCENTLIGHTHOUSE_USER }}
          key: ${{ secrets.TENCENTLIGHTHOUSE_KEY }}
          port: ${{ secrets.TENCENTLIGHTHOUSE_PORT }}
          script: |
            echo "=== 部署完成 ==="
            ls -la /home/deploy/apps/yuyu/
            echo "文件总数: $(ls /home/deploy/apps/yuyu/ | wc -l)"
